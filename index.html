<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMS 題測系統 - 114-2-1 物理 (顯示正確答案版)</title>
    <style>
        :root { 
            --primary: #2563eb; --bg: #f1f5f9; --card-bg: #ffffff; 
            --success: #10b981; --danger: #ef4444; --text: #1e293b;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 95%; max-width: 600px; }
        .status-bar { display: flex; justify-content: space-between; font-size: 0.9rem; color: #64748b; margin-bottom: 15px; }
        .question-text { font-size: 1.15rem; font-weight: bold; line-height: 1.5; margin-bottom: 20px; color: var(--text); }
        
        .option { padding: 15px; border: 2px solid #f1f5f9; border-radius: 12px; margin-bottom: 10px; cursor: pointer; background: #f8fafc; transition: 0.2s; position: relative; }
        .option:hover { background: #f1f5f9; }
        
        /* 選項狀態 */
        .option.selected { border-color: var(--primary); background: #eff6ff; }
        .option.correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534; font-weight: bold; }
        .option.wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: #991b1b; }
        
        .nav-btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .nav-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        /* 結算頁面 */
        .score-num { font-size: 4rem; color: var(--primary); font-weight: 900; margin: 20px 0; text-align: center; }
        .review-item { border-left: 4px solid var(--danger); padding: 10px 15px; background: #fff1f2; margin-bottom: 15px; border-radius: 4px; text-align: left; }
        .review-q { font-weight: bold; margin-bottom: 5px; }
        .review-ans { font-size: 0.9rem; color: #475569; }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <div class="status-bar">
        <span>114-2-1 物理測驗</span>
        <span id="progress">1 / 38</span>
    </div>
    <div class="question-text" id="q-text"></div>
    <div id="options-box"></div>
    <button class="nav-btn" id="next-btn" onclick="nextStep()" disabled>請先選擇答案</button>
</div>

<script>
    const fullQuiz = [
        {q: "將繩子固定在牆上開始甩動，1 秒內製造 1.5 個波形，請問繩波的速度為多少公尺/秒？", a: ["0.75", "1.5", "2", "5"], c: 2},
        {q: "承上題，P 點此時的振動方向為何？", a: ["上", "下", "左", "右"], c: 1},
        {q: "將一脈衝波自線密度較小的一繩傳向線密度較大的另一繩，其反射波與透射波形狀何者正確？", a: ["(A)", "(B)", "(C)", "(D)"], c: 3},
        {q: "降噪耳機開啟瞬間雜音不見，原理是利用聲波的？", a: ["反射", "折射", "繞射", "干涉"], c: 3},
        {q: "有關聲波敘述何者正確？", a: ["範圍 200~200000 Hz", "超聲波速快", "下波速慢", "下波波長長"], c: 3},
        {q: "聽垃圾車音樂比平常還高，代表公車與垃圾車？", a: ["正在靠近", "正在遠離", "保持靜止", "無法判斷"], c: 0},
        {q: "關於波前的敘述，何者正確？", a: ["與傳遞方向平行", "與傳遞方向垂直", "間距即振幅", "波谷連線"], c: 1},
        {q: "「波前上的每一點都可以視為新的點波源」由誰提出？", a: ["惠更斯", "牛頓", "都卜勒", "愛因斯坦"], c: 0},
        {q: "當水波由深水區進入淺水區時，若非垂直入射？", a: ["入>折，速慢", "入<折，速慢", "入>折，速快", "入<折，速快"], c: 0},
        {q: "關於水波干涉的敘述，何者錯誤？", a: ["疊加原理", "建設性振幅大", "破壞性代表消失", "破壞性振幅小"], c: 2},
        {q: "軍隊通過橋樑改為散步走，主要是為了避免？", a: ["官兵太累", "橋面損毀", "產生共振", "躲避偵查"], c: 2},
        {q: "「空山不見人，但聞人語響」是因為聲波的？", a: ["反射", "折射", "繞射", "干涉"], c: 2},
        {q: "撥打電話辨識同學聲音是憑藉？", a: ["音色", "響度", "音調", "分貝"], c: 0},
        {q: "星體紅移現象代表星體正在遠離，電磁波？", a: ["波長短", "波長長", "波速快", "振幅大"], c: 1},
        {q: "球場波浪舞屬於？", a: ["橫波", "縱波", "非力學波", "電磁波"], c: 0},
        {q: "波動敘述何者錯誤？", a: ["有反射折射", "都要介質", "不傳質量", "光是波動"], c: 1},
        {q: "黑板字不同位置都能看見，主因是？", a: ["折射", "鏡面反射", "繞射", "漫射"], c: 3},
        {q: "平面鏡成像何者錯誤？", a: ["物距=像距", "愈遠像愈小", "正立虛像", "左右相反"], c: 1},
        {q: "小明看凹面鏡影像變大且頭下腳上，他位於？", a: ["1~2倍焦距", "焦點內", "2倍焦距外", "焦點上"], c: 0},
        {q: "改看凸面鏡，影像變成？", a: ["倒立大實", "倒立小實", "正立大虛", "正立小虛"], c: 3},
        {q: "反射式望遠鏡裝設什麼收集光？", a: ["凸透鏡", "凸面鏡", "凹面鏡", "凹透鏡"], c: 2},
        {q: "水折射率4/3，真空速V1，水速V2，V1:V2=？", a: ["3:4", "4:3", "9:16", "16:9"], c: 1},
        {q: "貓看魚，魚看貓，何者正確？", a: ["貓看魚深", "貓深魚遠", "貓淺魚遠", "貓淺魚近"], c: 2},
        {q: "彩虹形成與何有關？(甲)反射 (乙)折射 (丙)干涉 (丁)繞射", a: ["甲乙", "甲丙", "乙丁", "丙丁"], c: 0},
        {q: "近視聚焦網膜前，應配戴？", a: ["凸面鏡", "凸透鏡", "凹面鏡", "凹透鏡"], c: 3},
        {q: "哪種儀器沒有使用凸透鏡？", a: ["老花", "顯微鏡", "山路鏡", "望遠鏡"], c: 2},
        {q: "來自「波動特性」的現象？", a: ["色散", "肥皂彩色", "夕陽紅", "倒影"], c: 1},
        {q: "干涉實驗改變寬度方法「不包括」？", a: ["變頻率", "變間距", "變屏距", "變亮度"], c: 3},
        {q: "凹面鏡「不會」出現哪種成像？", a: ["倒立大實", "正立小虛", "正立大虛", "倒立小實"], c: 1},
        {q: "訊號源放焦點反射平行發出應用了？", a: ["凸透鏡", "凸面鏡", "凹透鏡", "凹面鏡"], c: 3},
        {q: "內視鏡傳輸資料原理？", a: ["干涉", "疊加", "全反射", "直進性"], c: 2},
        {q: "透鏡下半部塗黑，屏幕上的像？", a: ["消失", "變正立", "變暗", "剩一半"], c: 2},
        {q: "圓弧玻璃看魚放大，原理類似？", a: ["凸透鏡", "凹透鏡", "凹面鏡", "凸面鏡"], c: 0},
        {q: "折射率概念何者錯誤？", a: ["愈大愈慢", "小進大偏法", "密介質指小", "真空最小"], c: 2},
        {q: "毛玻璃影像扭曲主因？", a: ["不平整折射", "反射", "折射率不均", "色散"], c: 0},
        {q: "陽光通過三稜鏡色散原因是？", a: ["折射率不同", "染色", "變波長", "材質"], c: 0},
        {q: "人眼變焦方式？", a: ["變折射率", "變水晶體曲率", "變視網膜距", "修正"], c: 1},
        {q: "何者「不是」因干涉產生的彩色？", a: ["肥皂泡", "油汙", "光碟", "彩虹"], c: 3}
    ];

    let currentIdx = 0;
    let score = 0;
    let hasAnswered = false;
    let wrongRecords = [];

    function render() {
        hasAnswered = false;
        const q = fullQuiz[currentIdx];
        document.getElementById('progress').innerText = `${currentIdx + 1} / ${fullQuiz.length}`;
        document.getElementById('q-text').innerText = `${currentIdx + 1}. ${q.q}`;
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.disabled = true;
        nextBtn.innerText = currentIdx === fullQuiz.length - 1 ? "查看結算" : "下一題";

        const box = document.getElementById('options-box');
        box.innerHTML = '';

        q.a.forEach((txt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = `${String.fromCharCode(65 + i)}. ${txt}`;
            div.onclick = () => selectOption(div, i);
            box.appendChild(div);
        });
    }

    function selectOption(el, index) {
        if (hasAnswered) return;
        hasAnswered = true;
        
        const q = fullQuiz[currentIdx];
        const options = document.querySelectorAll('.option');
        
        if (index === q.c) {
            el.classList.add('correct');
            score++;
        } else {
            el.classList.add('wrong');
            options[q.c].classList.add('correct'); // 標出正確答案
            wrongRecords.push({
                q: q.q,
                user: q.a[index],
                correct: q.a[q.c]
            });
        }
        
        document.getElementById('next-btn').disabled = false;
    }

    function nextStep() {
        if (currentIdx < fullQuiz.length - 1) {
            currentIdx++;
            render();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        const finalScore = Math.round((score / fullQuiz.length) * 100);
        let html = `
            <div style="text-align:center">
                <h2>測驗完成</h2>
                <div class="score-num">${finalScore}</div>
                <p>正確：${score} / 總計：${fullQuiz.length}</p>
                <button class="nav-btn" onclick="location.reload()">重新測驗</button>
                <hr style="margin:20px 0; border:0; border-top:1px solid #ddd;">
                <h3 style="text-align:left">錯題回顧：</h3>
        `;

        if (wrongRecords.length === 0) {
            html += `<p style="color:var(--success)">完美！沒有錯題。</p>`;
        } else {
            wrongRecords.forEach((item, i) => {
                html += `
                    <div class="review-item">
                        <div class="review-q">${i+1}. ${item.q}</div>
                        <div class="review-ans">你的答案：<span style="color:var(--danger)">${item.user}</span></div>
                        <div class="review-ans">正確答案：<span style="color:var(--success)">${item.correct}</span></div>
                    </div>
                `;
            });
        }
        
        html += `</div>`;
        document.getElementById('quiz-container').innerHTML = html;
    }

    render();
</script>
</body>
</html>
