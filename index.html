<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測驗中心</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            transition: all 0.3s ease;
        }
        h2 { color: #1e293b; margin-top: 0; }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.1rem;
            margin: 20px 0;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:hover { opacity: 0.9; }

        /* 測驗介面 */
        #quiz-area { display: none; }
        .option {
            padding: 15px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            background: #f8fafc;
            transition: 0.2s;
        }
        .option:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .option.selected {
            background: #dbeafe;
            border-color: var(--primary);
            color: #1e40af;
            font-weight: bold;
        }
        #msg { color: #ef4444; font-size: 0.9rem; margin-top: 10px; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <div id="login-area">
        <h2>RMS 題測系統</h2>
        <p style="color: #64748b;">請輸入測驗代碼以獲取試題</p>
        <input type="text" id="quiz-input" placeholder="例如：12345" autocomplete="off">
        <button onclick="startLoad()">進入測驗</button>
        <div id="msg"></div>
    </div>

    <div id="quiz-area">
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem; color: #64748b;">
            <span id="quiz-title-text"></span>
            <span id="progress-text"></span>
        </div>
        <h3 id="question-text" style="margin: 20px 0;"></h3>
        <div id="options-container"></div>
        <button id="next-btn" style="margin-top: 20px;" onclick="nextStep()">下一題</button>
    </div>
</div>

<script>
    // --- 請修改以下配置 ---
    const GITHUB_CONFIG = {
        user: "你的GitHub帳號",
        repo: "你的倉庫名稱",
        branch: "main" // 或是 master
    };

    let quizData = null;
    let currentIdx = 0;
    let userAnswers = [];

    async function startLoad() {
        const code = document.getElementById('quiz-input').value.trim();
        const msg = document.getElementById('msg');
        if (!code) return;

        msg.style.color = "#2563eb";
        msg.innerText = "正在連線至 GitHub 倉庫...";

        const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.user}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${code}.json`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("找不到檔案 (代碼錯誤)");

            quizData = await response.json();
            
            // 進入測驗狀態
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('quiz-title-text').innerText = quizData.title || "線上測試";
            
            renderQuestion();
        } catch (err) {
            msg.style.color = "#ef4444";
            msg.innerText = err.message;
        }
    }

    function renderQuestion() {
        const q = quizData.questions[currentIdx];
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${quizData.questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        q.a.forEach((txt, i) => {
            const div = document.createElement('div');
            div.className = `option ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
            div.innerText = txt;
            div.onclick = () => {
                userAnswers[currentIdx] = i;
                renderQuestion();
            };
            container.appendChild(div);
        });

        document.getElementById('next-btn').innerText = 
            currentIdx === quizData.questions.length - 1 ? "完成並交卷" : "下一題";
    }

    function nextStep() {
        if (userAnswers[currentIdx] === undefined) return alert("請選擇答案");

        if (currentIdx < quizData.questions.length - 1) {
            currentIdx++;
            renderQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        let score = 0;
        quizData.questions.forEach((q, i) => {
            if (userAnswers[i] === q.c) score++;
        });

        const finalScore = Math.round((score / quizData.questions.length) * 100);
        const card = document.getElementById('main-card');
        card.innerHTML = `
            <div style="text-align: center; padding: 20px;">
                <h2 style="margin-bottom: 10px;">測驗結算</h2>
                <div style="font-size: 4rem; color: var(--primary); font-weight: 900; margin: 15px 0;">${finalScore}</div>
                <p>得分：${finalScore} / 100</p>
                <p>答對：${score} 題 / 總計：${quizData.questions.length} 題</p>
                <button style="margin-top: 20px;" onclick="location.reload()">返回系統</button>
            </div>
        `;
    }
</script>

</body>
</html>
